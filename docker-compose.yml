version: "3.9"

services:
  db:
    image: postgres:15
    container_name: smart_assistant_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: smart_assistant_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: